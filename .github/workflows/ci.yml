name: CI/CD

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: 'npm'
                cache-dependency-path: |
                  client/package-lock.json
                  backend/package-lock.json

            # Check Client
            - name: Install Client Dependencies
              run: npm ci
              working-directory: ./client

            # Check Backend
            - name: Install Backend Dependencies
              run: npm ci
              working-directory: ./backend

            - name: Lint and Typecheck
              run: |
                cd client && npm run lint && npx tsc --noEmit
                cd ../backend && npm run lint && npx tsc --noEmit
            
    deploy-preview:
        needs: check
        runs-on: ubuntu-latest
        if: github.ref != 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: 'npm'
                cache-dependency-path: ./client/package-lock.json
            - run: npm ci
              working-directory: ./client
            - name: Vercel Pull, Build and Deploy
              working-directory: ./client
              run: |
                npx vercel pull --yes --environment=preview --token ${{ secrets.VERCEL_TOKEN }}
                npx vercel build --token ${{ secrets.VERCEL_TOKEN }}
                npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
              env:
                VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    deploy-production:
        needs: check
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: 'npm'
                cache-dependency-path: ./client/package-lock.json
            - run: npm ci
              working-directory: ./client
            - name: Vercel Pull, Build and Deploy
              working-directory: ./client
              run: |
                npx vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
                npx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
                npx vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
              env:
                VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
