name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
      
      - name: Build and Start Backend
        run: |
          # We only use the prod file to avoid frontend variable errors
          docker compose -f docker-compose.prod.yml up -d --build
          
      - name: Wait for backend to be healthy
        run: |
          for i in {1..30}; do
            # Checking if the container is running and responding
            if [ "$(docker inspect -f '{{.State.Running}}' tracevault-backend-1)" == "true" ]; then
              echo "Backend is up!" && exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          docker compose -f docker-compose.prod.yml logs backend
          exit 1

      - name: Stop and clean up
        run: docker compose -f docker-compose.prod.yml down

  # ... (deploy-preview and deploy-production jobs for Vercel stay the same)

  deploy-backend:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://54.234.194.97:4000
    steps:
      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            cd /var/www/tracevault/TraceVault
            git fetch --all
            git reset --hard origin/main
            
            # Use ONLY the production file to manage the EC2 containers
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build