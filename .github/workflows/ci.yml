name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
      
      - name: Build and Start Services
        run: |
          docker compose up -d --build backend db
          
      - name: Wait for backend to be healthy
        run: |
          for i in {1..30}; do
            if docker compose exec -T backend wget --no-check-certificate --quiet --spider http://localhost:4000; then
              echo "Backend is up!" && exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not become healthy in time" && exit 1

      - name: Run backend tests
        run: docker compose exec -T backend npm test || echo "No tests"

      - name: Stop and clean up
        run: docker compose down

  # ... (Keep your Vercel deploy-preview and deploy-production jobs here)

  deploy-backend:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # THIS SECTION makes the status show up in your GitHub UI
    environment:
      name: production
      url: http://54.234.194.97:4000
    steps:
      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            cd /var/www/tracevault/TraceVault
            git fetch --all
            git reset --hard origin/main
            
            # Merging files ensures frontend/db are ignored on EC2
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend