services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4000:4000"
    env_file:
      # 'required: false' prevents GitHub Actions from crashing 
      # when it can't find your gitignored .env file
      - path: ./backend/.env
        required: false
    environment:
      - NODE_ENV=production