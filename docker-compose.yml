services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: tracevault
      POSTGRES_PASSWORD: tracevault
      POSTGRES_DB: tracevault
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - '4000:4000'
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build: ./client
    restart: always
    depends_on:
      - backend
    env_file:
      - ./client/.env
    ports:
      - '3000:3000'
    volumes:
      - ./client/public:/app/public

volumes:
  pgdata:
